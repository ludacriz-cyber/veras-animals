<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VERA'S ANIMALS</title>
    <style>
        :root {
            --tile-bg: #1a1a2e;
            --accent-blue: #4facfe;
            --text-color: #ff4081;
        }
        
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            user-select: none; -webkit-user-select: none;
            background: linear-gradient(-45deg, #ff9a9e, #fecfef, #a1c4fd, #c2e9fb);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #start-screen, #win-screen, #game-wrapper {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 100;
        }
        
        #start-screen { background: rgba(26, 26, 46, 0.95); }
        
        /* Baby Photo Style */
        .baby-photo {
            width: 180px; height: 180px;
            border-radius: 50%;
            border: 6px solid white;
            margin-bottom: 20px;
            object-fit: cover;
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
            animation: babyBounce 3s infinite ease-in-out;
        }

        @keyframes babyBounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        h1 {
            color: #fff; font-size: clamp(2.5rem, 10vw, 4rem); 
            text-shadow: 0 4px 15px rgba(0,0,0,0.3);
            margin: 0 0 20px 0; text-align: center;
        }

        .play-btn {
            padding: 18px 50px; font-size: 2rem; background: var(--text-color);
            color: white; border: none; border-radius: 40px; cursor: pointer;
            box-shadow: 0 8px 25px rgba(255, 64, 129, 0.5);
            font-weight: bold;
        }

        #score-display {
            position: absolute; top: env(safe-area-inset-top, 20px); 
            width: 100%; text-align: center;
            color: white; font-size: 1.8rem; z-index: 150; font-weight: bold;
        }

        #game-container {
            width: 92vw; height: 92vw;
            max-width: 480px; max-height: 480px;
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
            padding: 15px; background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px); border-radius: 25px;
        }

        .tile {
            background: var(--tile-bg); border-radius: 15px;
            display: flex; justify-content: center; align-items: center;
            font-size: 3.5rem; color: white;
            box-shadow: 0 5px 0px #000;
        }

        .tile.selected { transform: scale(0.85); background: var(--accent-blue); border: 4px solid white; box-shadow: none; }
        
        #win-screen { 
            display: none; background: rgba(0,0,0,0.8); z-index: 300;
        }

        .confetti-piece {
            position: absolute; width: 12px; height: 12px;
            pointer-events: none; z-index: 250; will-change: transform;
        }

        /* Credits tag */
        .ai-tag {
            position: absolute; bottom: 10px; color: rgba(255,255,255,0.3);
            font-size: 0.8rem; text-align: center; width: 100%;
        }
    </style>
</head>
<body>

    <div id="score-display">SCORE: <span id="score-val">0</span></div>

    <div id="start-screen">
        <img src="baby.jpg" alt="Vera" class="baby-photo">
        <h1>VERA'S ANIMALS</h1>
        <button class="play-btn" onclick="initGame()">PLAY</button>
        <div class="ai-tag">Handcrafted for Vera by Gemini AI & Family</div>
    </div>

    <div id="win-screen">
        <h1 style="font-size: 5rem;">🏆</h1>
        <h1>VERA WINS!</h1>
        <button class="play-btn" onclick="location.reload()">PLAY AGAIN</button>
    </div>

    <div id="game-wrapper" style="display:none;">
        <div id="game-container"></div>
    </div>

    <div id="confetti-holder"></div>

    <script>
        const container = document.getElementById('game-container');
        const scoreVal = document.getElementById('score-val');
        let score = 0;
        let selectedTiles = [];
        let audioCtx, bgAudio, introAudio;

        const allAnimals = [
            { icon: '🐶', type: 'dog', sound: 'dog.mp3' },
            { icon: '🐱', type: 'cat', sound: 'cat.mp3' },
            { icon: '🐮', type: 'cow', sound: 'cow.mp3' },
            { icon: '🐷', type: 'pig', sound: 'pig.mp3' },
            { icon: '🦁', type: 'lion', sound: 'lion.mp3' },
            { icon: '🐸', type: 'frog', sound: 'frog.mp3' },
            { icon: '🦆', type: 'duck', sound: 'duck.mp3' },
            { icon: '🐒', type: 'monkey', sound: 'monkey.mp3' },
            { icon: '🐘', type: 'elephant', sound: 'elephant.mp3' },
            { icon: '🐑', type: 'sheep', sound: 'sheep.mp3' }
        ];

        const praises = ['praise1.mp3', 'praise2.mp3', 'praise3.mp3', 'praise4.mp3', 'praise5.mp3'];

        function unlockAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            if (!introAudio) {
                introAudio = new Audio('intro.mp3');
                introAudio.play().catch(() => {});
            }
        }

        window.addEventListener('touchstart', unlockAudio, { once: true });
        window.addEventListener('mousedown', unlockAudio, { once: true });

        function playSnd(file, loop = false, vol = 1) {
            const a = new Audio(file);
            a.loop = loop;
            a.volume = vol;
            a.play().catch(() => {});
            return a;
        }

        function createGrid() {
            container.innerHTML = '';
            let pool = [...allAnimals].sort(() => 0.5 - Math.random()).slice(0, 5);
            for (let i = 0; i < 16; i++) {
                const animal = pool[Math.floor(Math.random() * pool.length)];
                const div = document.createElement('div');
                div.className = 'tile';
                div.innerHTML = animal.icon;
                div.onclick = () => handleTap(div, animal);
                container.appendChild(div);
            }
        }

        function handleTap(el, animal) {
            if (el.classList.contains('selected')) return;

            if (selectedTiles.length > 0 && animal.type !== selectedTiles[0].type) {
                selectedTiles.forEach(t => t.classList.remove('selected'));
                selectedTiles = [];
                return;
            }

            el.classList.add('selected');
            selectedTiles.push(el);

            if (selectedTiles.length === 3) {
                score += 2;
                scoreVal.innerText = score;
                const match = [...selectedTiles];
                selectedTiles = [];

                setTimeout(() => {
                    playSnd(animal.sound);
                    setTimeout(() => playSnd(praises[Math.floor(Math.random() * praises.length)]), 1500);
                    burstConfetti();

                    match.forEach(m => {
                        m.style.visibility = 'hidden';
                        setTimeout(() => {
                            const next = allAnimals[Math.floor(Math.random() * allAnimals.length)];
                            m.innerHTML = next.icon;
                            m.onclick = () => handleTap(m, next);
                            m.style.visibility = 'visible';
                            m.classList.remove('selected');
                        }, 500);
                    });
                    if (score >= 10) showWin();
                }, 400);
            }
        }

        function initGame() {
            if (introAudio) { introAudio.pause(); introAudio.currentTime = 0; }
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-wrapper').style.display = 'flex';
            bgAudio = playSnd('play_bg.mp3', true, 0.3);
            createGrid();
        }

        function showWin() {
            if (bgAudio) bgAudio.pause();
            document.getElementById('win-screen').style.display = 'flex';
            playSnd('piano.mp3', true, 0.5);
            playSnd('yay.mp3');
            setInterval(burstConfetti, 800);
        }

        function burstConfetti() {
            const colors = ['#ff4081', '#4facfe', '#f6d365', '#fda085', '#ffffff'];
            for (let i = 0; i < 50; i++) {
                const c = document.createElement('div');
                c.className = 'confetti-piece';
                c.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                c.style.left = Math.random() * 100 + 'vw';
                c.style.top = '-10px';
                document.body.appendChild(c);

                c.animate([
                    { transform: `translate(0, 0) rotate(0deg)`, opacity: 1 },
                    { transform: `translate(${Math.random()*100-50}px, 100vh) rotate(${Math.random()*360}deg)`, opacity: 0 }
                ], { duration: 2000 + Math.random() * 1000 }).onfinish = () => c.remove();
            }
        }
    </script>
</body>
</html>
