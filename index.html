<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VERA'S FARM</title>
    <style>
        :root {
            --tile-bg: #1a1a2e;
            --text-color: #ff4081;
        }
        
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            user-select: none; -webkit-user-select: none; -webkit-tap-highlight-color: transparent;
            background: linear-gradient(-45deg, #ff9a9e, #fecfef, #a1c4fd, #c2e9fb);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #audio-controls {
            position: absolute;
            top: env(safe-area-inset-top, 20px);
            right: 20px;
            z-index: 500;
            display: flex; gap: 12px;
        }

        .audio-btn {
            width: 50px; height: 50px;
            border-radius: 50%; border: 3px solid white;
            background: rgba(255, 64, 129, 0.85);
            color: white; font-size: 1.5rem;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
            transition: transform 0.1s;
        }
        .audio-btn:active { transform: scale(0.85); }

        #start-screen, #win-screen, #game-wrapper {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 100;
        }
        
        #start-screen {
            /* Removed the static image background CSS */
            overflow: hidden;
            will-change: mask-image, -webkit-mask-image; 
        }

        /* --- NEW: Video Background CSS --- */
        .bg-video {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover; /* Makes the video fill the screen without stretching */
            z-index: -1; /* Puts the video behind the text and buttons */
            /* Optional: Add filter: brightness(0.8); if the video makes the text hard to read */
        }

        #start-title {
            font-size: clamp(3rem, 15vw, 5rem); 
            margin: 0 0 20px 0; 
            text-align: center; position: relative; z-index: 10;
            font-family: "Comic Sans MS", "Comic Sans", cursive;
            color: #ff4081; -webkit-text-stroke: 2px white;
            filter: drop-shadow(0px 6px 15px rgba(0,0,0,0.8));
        }

        .letter {
            display: inline-block; will-change: transform;
            animation: scaleBounce 1.5s ease-in-out infinite;
        }
        @keyframes scaleBounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        .letter:nth-child(1) { animation-delay: 0s; }
        .letter:nth-child(2) { animation-delay: 0.1s; }
        .letter:nth-child(3) { animation-delay: 0.2s; }
        .letter:nth-child(4) { animation-delay: 0.3s; }
        .letter:nth-child(5) { animation-delay: 0.4s; }
        .letter:nth-child(6) { animation-delay: 0.5s; }
        .letter:nth-child(7) { animation-delay: 0.6s; }
        .letter:nth-child(8) { animation-delay: 0.7s; }
        .letter:nth-child(9) { animation-delay: 0.8s; }
        .letter:nth-child(10) { animation-delay: 0.9s; }
        .letter:nth-child(11) { animation-delay: 1.0s; }

        .play-btn {
            padding: 18px 30px; font-size: clamp(1.2rem, 5vw, 1.8rem); 
            background: var(--text-color); color: white; border: none; 
            border-radius: 40px; cursor: pointer;
            box-shadow: 0 8px 25px rgba(255, 64, 129, 0.5);
            font-weight: bold; position: relative; z-index: 10;
            margin-top: 15vh; 
        }

        #score-display {
            position: absolute; top: env(safe-area-inset-top, 20px); 
            left: 20px; 
            color: white; font-size: 1.8rem; z-index: 150; font-weight: bold;
            text-shadow: 0 4px 15px rgba(0,0,0,0.8);
        }

        #game-container {
            width: 92vw; height: 92vw; max-width: 450px; max-height: 450px;
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
            padding: 10px; background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border-radius: 20px;
        }

        .tile {
            background: var(--tile-bg); border-radius: 12px;
            display: flex; justify-content: center; align-items: center;
            font-size: 3rem; color: white; transition: transform 0.1s;
        }

        .tile.selected { 
            transform: scale(0.85); 
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%) !important; 
            border: 4px solid white; box-shadow: none; 
        }

        .tile.wrong { 
            animation: iphoneVibrate 0.4s; 
            background: linear-gradient(135deg, #ff0844 0%, #ffb199 100%) !important;
            border: 4px solid white;
        }

        @keyframes iphoneVibrate {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        
        #win-screen { display: none; background: rgba(0,0,0,0.8); z-index: 300; }
        #win-title { color: #fff; font-size: clamp(2.5rem, 12vw, 4.5rem); margin: 0 0 20px 0; text-align: center; }
        
        #win-animals {
            display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; height: 80px;
        }

        .wiggling-animal {
            font-size: 4.5rem; filter: drop-shadow(0 4px 10px rgba(0,0,0,0.5));
            animation: victoryWiggle 1s ease-in-out infinite; will-change: transform;
        }

        .wiggling-animal:nth-child(even) { animation-direction: reverse; animation-duration: 1.2s; }

        @keyframes victoryWiggle {
            0%, 100% { transform: rotate(-15deg) scale(1); }
            50% { transform: rotate(15deg) scale(1.15); }
        }

        .emoji-boom {
            position: absolute; pointer-events: none; will-change: transform, opacity;
            font-size: 5rem; display: flex; justify-content: center; align-items: center;
            width: auto; height: auto; text-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .simple-confetti {
            position: absolute; pointer-events: none; will-change: transform;
            width: 10px; height: 20px; border-radius: 2px;
        }

        .ai-tag {
            position: absolute; bottom: calc(env(safe-area-inset-bottom, 10px) + 1vh);
            color: rgba(255,255,255,0.7); font-size: 0.8rem; text-align: center; width: 100%;
            text-shadow: 0 4px 10px rgba(0,0,0,0.8); z-index: 10;
        }
    </style>
</head>
<body>

    <div id="audio-controls">
        <button class="audio-btn" onclick="forcePlayMusic()" title="Play Music">🎵</button>
        <button class="audio-btn" onclick="muteAll()" title="Mute All">🔇</button>
    </div>

    <div id="score-display">SCORE: <span id="score-val">0</span></div>

    <div id="start-screen">
        <video class="bg-video" autoplay loop muted playsinline>
            <source src="baby.mp4" type="video/mp4">
        </video>
        
        <h1 id="start-title">VERA'S FARM</h1>
        <button class="play-btn" onclick="initGame()">LETS GO VERAAAA</button>
        <div class="ai-tag">Handcrafted for Vera by Gemini AI & Family</div>
    </div>

    <div id="win-screen">
        <div id="win-animals"></div>
        <h1 id="win-title">VERA WINS!</h1>
        <button class="play-btn" onclick="resetGame()">AGAIN?</button>
    </div>

    <div id="game-wrapper" style="display:none;">
        <div id="game-container"></div>
    </div>
    
    <div id="boom-holder" style="position: fixed; top: 0; left: 0; pointer-events: none; z-index: 50; width: 100vw; height: 100vh;"></div>
    <div id="confetti-holder" style="position: fixed; top: 0; left: 0; pointer-events: none; z-index: 350; width: 100vw; height: 100vh;"></div>

    <script>
        const container = document.getElementById('game-container');
        const scoreVal = document.getElementById('score-val');
        const boomHolder = document.getElementById('boom-holder');
        const confettiHolder = document.getElementById('confetti-holder');
        const startScreen = document.getElementById('start-screen');
        const gameWrapper = document.getElementById('game-wrapper');
        const winAnimals = document.getElementById('win-animals');
        
        let score = 0;
        let selectedTiles = [];
        let audioCtx, bgAudio, pianoAudio, introAudio;
        let gameActive = false;
        let isGlobalMuted = false;

        const allAnimals = [
            { icon: '🐶', type: 'dog', sound: 'dog.mp3' },
            { icon: '🐱', type: 'cat', sound: 'cat.mp3' },
            { icon: '🐮', type: 'cow', sound: 'cow.mp3' },
            { icon: '🐷', type: 'pig', sound: 'pig.mp3' },
            { icon: '🦁', type: 'lion', sound: 'lion.mp3' },
            { icon: '🐸', type: 'frog', sound: 'frog.mp3' },
            { icon: '🦆', type: 'duck', sound: 'duck.mp3' },
            { icon: '🐒', type: 'monkey', sound: 'monkey.mp3' },
            { icon: '🐘', type: 'elephant', sound: 'elephant.mp3' },
            { icon: '🐑', type: 'sheep', sound: 'sheep.mp3' }
        ];

        const praises = ['praise1.mp3', 'praise2.mp3', 'praise3.mp3', 'praise4.mp3', 'praise5.mp3'];

        function muteAll() {
            isGlobalMuted = true;
            if (introAudio) introAudio.muted = true;
            if (bgAudio) bgAudio.muted = true;
            if (pianoAudio) pianoAudio.muted = true;
        }

        function forcePlayMusic() {
            isGlobalMuted = false; 
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();

            if (introAudio) introAudio.muted = false;
            if (bgAudio) bgAudio.muted = false;
            if (pianoAudio) pianoAudio.muted = false;

            if (!gameActive) {
                if (!introAudio) introAudio = new Audio('intro.mp3');
                introAudio.play().catch(() => {});
            } else if (bgAudio && bgAudio.paused) {
                bgAudio.play().catch(() => {});
            }
        }

        function playSnd(file, loop = false, vol = 1) {
            const a = new Audio(file);
            a.loop = loop;
            a.volume = vol;
            a.muted = isGlobalMuted; 
            a.play().catch(() => {});
            return a;
        }

        function synthPop(freq, type = 'sine', decay = 0.2) {
            if (isGlobalMuted) return; 
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            g.gain.setValueAtTime(0.1, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + decay);
            osc.connect(g); g.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + decay);
        }

        function animateTitleText() {
            const titleEl = document.getElementById('start-title');
            if (!titleEl) return;
            const text = titleEl.innerText; 
            titleEl.innerHTML = ''; 

            [...text].forEach(char => {
                const span = document.createElement('span');
                span.className = 'letter';
                span.innerText = char === ' ' ? '\u00A0' : char;
                titleEl.appendChild(span);
            });
        }
        window.addEventListener('load', animateTitleText);

        function createGrid() {
            container.innerHTML = '';
            let pool = [...allAnimals].sort(() => 0.5 - Math.random()).slice(0, 5);
            for (let i = 0; i < 16; i++) {
                const animal = pool[Math.floor(Math.random() * pool.length)];
                const div = document.createElement('div');
                div.className = 'tile';
                div.innerHTML = animal.icon;
                div.onclick = (e) => {
                    e.preventDefault(); 
                    handleTap(div, animal);
                };
                container.appendChild(div);
            }
        }

        function handleTap(el, animal) {
            if (el.classList.contains('selected') || el.classList.contains('wrong')) return;
            
            if (selectedTiles.length > 0 && animal.type !== selectedTiles[0].animal.type) {
                synthPop(120, 'sawtooth', 0.3); 
                el.classList.add('wrong');
                setTimeout(() => {
                    selectedTiles.forEach(t => t.el.classList.remove('selected'));
                    selectedTiles = [];
                    el.classList.remove('wrong');
                }, 500);
                return;
            }
            
            synthPop(440, 'sine', 0.2); 
            el.classList.add('selected');
            selectedTiles.push({ el: el, animal: animal });
            
            if (selectedTiles.length === 3) {
                score += 2; scoreVal.innerText = score;
                const match = [...selectedTiles]; selectedTiles = [];
                setTimeout(() => {
                    playSnd(animal.sound);
                    setTimeout(() => playSnd(praises[Math.floor(Math.random() * praises.length)]) , 1400);
                    
                    const rect = el.getBoundingClientRect();
                    burstSonicBoom(rect.left + rect.width/2, rect.top + rect.height/2, animal.icon);

                    match.forEach(m => {
                        m.el.style.visibility = 'hidden';
                        setTimeout(() => {
                            const next = allAnimals[Math.floor(Math.random() * allAnimals.length)];
                            m.el.innerHTML = next.icon;
                            m.el.onclick = () => handleTap(m.el, next);
                            m.el.style.visibility = 'visible';
                            m.el.classList.remove('selected');
                        }, 500);
                    });
                    if (score >= 10) setTimeout(showWin, 1200);
                }, 400);
            }
        }

        function initGame() {
            gameActive = true; 
            if (introAudio) { introAudio.pause(); introAudio.currentTime = 0; }
            
            gameWrapper.style.display = 'flex';
            bgAudio = playSnd('play_bg.mp3', true, 0.3);
            createGrid();

            let angle = 0;
            function wipeTransition() {
                angle += 6; 
                if (angle <= 360) {
                    const mask = `conic-gradient(from 0deg, transparent ${angle}deg, black 0deg)`;
                    startScreen.style.webkitMaskImage = mask;
                    startScreen.style.maskImage = mask;
                    requestAnimationFrame(wipeTransition);
                } else {
                    startScreen.style.display = 'none';
                    startScreen.style.webkitMaskImage = '';
                    startScreen.style.maskImage = '';
                    // Stop the video to save battery once the game starts
                    const bgVideo = document.querySelector('.bg-video');
                    if(bgVideo) bgVideo.pause();
                }
            }
            requestAnimationFrame(wipeTransition);
        }

        function showWin() {
            if (bgAudio) bgAudio.pause(); 
            document.getElementById('win-screen').style.display = 'flex';
            
            winAnimals.innerHTML = '';
            let winPool = [...allAnimals].sort(() => 0.5 - Math.random()).slice(0, 4);
            winPool.forEach(a => {
                const span = document.createElement('span');
                span.className = 'wiggling-animal';
                span.innerText = a.icon;
                winAnimals.appendChild(span);
            });

            pianoAudio = playSnd('piano.mp3', true, 0.5); playSnd('yay.mp3');
            
            winInterval = setInterval(() => {
                burstSimpleConfetti(Math.random() * window.innerWidth, Math.random() * window.innerHeight);
            }, 500);
        }

        function resetGame() { location.reload(); }

        function burstSonicBoom(x, y, emoji) {
            const ring = document.createElement('div');
            ring.style.position = 'absolute';
            ring.style.left = x + 'px'; ring.style.top = y + 'px';
            ring.style.width = '20px'; ring.style.height = '20px';
            ring.style.borderRadius = '50%';
            ring.style.border = '10px solid rgba(255, 255, 255, 0.9)';
            ring.style.boxShadow = '0 0 20px rgba(255,255,255,0.5)';
            ring.style.pointerEvents = 'none';
            boomHolder.appendChild(ring);

            ring.animate([
                { transform: 'translate(-50%, -50%) scale(1)', opacity: 1, borderWidth: '15px' },
                { transform: 'translate(-50%, -50%) scale(40)', opacity: 0, borderWidth: '1px' }
            ], { duration: 600, easing: 'cubic-bezier(0.1, 0.8, 0.2, 1)' }).onfinish = () => ring.remove();

            for (let i = 0; i < 12; i++) { 
                const c = document.createElement('div');
                c.className = 'emoji-boom';
                c.style.left = x + 'px'; c.style.top = y + 'px';
                c.innerText = emoji; 

                const angle = Math.random() * Math.PI * 2;
                const velocity = Math.random() * 400 + 200; 
                const tx = Math.cos(angle) * velocity;
                const ty = Math.sin(angle) * velocity;

                c.animate([
                    { transform: 'translate(-50%, -50%) scale(0) rotate(0deg)', opacity: 1 },
                    { transform: `translate(calc(-50% + ${tx * 0.7}px), calc(-50% + ${ty * 0.7}px)) scale(1.8) rotate(${Math.random() * 180 - 90}deg)`, opacity: 1, offset: 0.15 },
                    { transform: `translate(calc(-50% + ${tx}px), calc(-50% + ${ty}px)) scale(0.8) rotate(${Math.random() * 360}deg)`, opacity: 0 }
                ], { duration: 1200 + Math.random() * 600, easing: 'cubic-bezier(0.1, 0.8, 0.3, 1)' }).onfinish = () => c.remove();
                
                boomHolder.appendChild(c);
            }
        }

        function burstSimpleConfetti(x, y) {
            const colors = ['#ff4081', '#4facfe', '#f6d365', '#fda085', '#ffffff', '#43e97b'];
            for (let i = 0; i < 30; i++) {
                const c = document.createElement('div');
                c.className = 'simple-confetti';
                c.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                c.style.left = x + 'px';
                c.style.top = y + 'px';

                const angle = Math.random() * Math.PI * 2;
                const velocity = Math.random() * 150 + 50;
                const tx = Math.cos(angle) * velocity;
                const ty = Math.sin(angle) * velocity + 100;

                c.animate([
                    { transform: 'translate(-50%, -50%) scale(1) rotate(0deg)', opacity: 1 },
                    { transform: `translate(calc(-50% + ${tx}px), calc(-50% + ${ty}px)) scale(0.5) rotate(${Math.random() * 720}deg)`, opacity: 0 }
                ], { duration: 1000 + Math.random() * 500, easing: 'ease-out' }).onfinish = () => c.remove();
                
                confettiHolder.appendChild(c);
            }
        }
    </script>
</body>
</html>
