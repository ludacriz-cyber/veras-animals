<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VERA'S ANIMALS</title>
    <style>
        :root {
            --tile-bg: #1a1a2e;
            --accent-blue: #4facfe;
            --text-color: #ff4081;
        }
        
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: #ff9a9e;
            font-family: 'Arial Rounded MT Bold', sans-serif;
            user-select: none; -webkit-user-select: none;
            background: linear-gradient(-45deg, #ff9a9e, #fecfef, #a1c4fd, #c2e9fb);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #start-screen, #win-screen {
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            height: 100vh; position: absolute; width: 100%; z-index: 100;
        }
        #start-screen { background: rgba(26, 26, 46, 0.9); }
        #win-screen { 
            display: none; background: linear-gradient(-45deg, #f6d365, #fda085, #fbc2eb, #a18cd1);
            background-size: 400% 400%; animation: gradientBG 5s ease infinite; color: white;
        }

        h1 { color: #fff; font-size: clamp(3rem, 8vw, 5rem); text-shadow: 0 4px 15px rgba(0,0,0,0.3); text-align: center; }

        .play-btn {
            padding: 20px 60px; font-size: 2.5rem; background: var(--text-color);
            color: white; border: none; border-radius: 50px; cursor: pointer;
            box-shadow: 0 8px 25px rgba(255, 64, 129, 0.5);
        }

        #score-display {
            position: absolute; top: 20px; width: 100%; text-align: center;
            color: white; font-size: 2rem; z-index: 110; text-shadow: 0 3px 10px rgba(0,0,0,0.4);
        }

        #game-wrapper { display: none; height: 100vh; width: 100%; justify-content: center; align-items: center; position: relative; z-index: 10; }
        #game-container {
            width: 90vmin; max-width: 550px; aspect-ratio: 1 / 1; 
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; padding: 15px;
            background: rgba(255, 255, 255, 0.25); backdrop-filter: blur(8px); border-radius: 25px;
        }

        .tile {
            background: var(--tile-bg); border-radius: 15px;
            display: flex; justify-content: center; align-items: center;
            font-size: clamp(2rem, 10vmin, 4.5rem); color: white; transition: transform 0.1s;
        }

        .tile.selected { transform: scale(0.85); background: var(--accent-blue); border: 4px solid white; }
        .tile.wrong { animation: errorFade 0.4s ease-out; }
        @keyframes errorFade { 0% { background: #ff3333; } 100% { background: var(--tile-bg); } }
        .pop { animation: pop-out 0.4s forwards; }
        @keyframes pop-out { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(0); opacity: 0; } }

        .confetti-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }
        .confetti-piece { position: absolute; width: 14px; height: 14px; border-radius: 2px; animation: fireworkBurst ease-out forwards; }
        @keyframes fireworkBurst { 
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; } 
            100% { transform: translate(calc(-50% + var(--target-x)), calc(-50% + var(--target-y))) rotate(var(--rotation)) scale(0.2); opacity: 0; } 
        }
    </style>
</head>
<body>

    <div id="score-display">SCORE: <span id="score-val">0</span></div>

    <div id="start-screen">
        <h1>VERA'S ANIMALS</h1>
        <button class="play-btn" onclick="initGame()">PLAY</button>
    </div>

    <div id="win-screen">
        <h1>🎉 VERA WINS! 🎉</h1>
        <button class="play-btn" onclick="resetGame()">AGAIN?</button>
    </div>

    <div id="game-wrapper"><div id="game-container"></div></div>
    <div id="confetti-holder" class="confetti-container"></div>

    <script>
        const wrapper = document.getElementById('game-wrapper');
        const container = document.getElementById('game-container');
        const holder = document.getElementById('confetti-holder');
        const scoreVal = document.getElementById('score-val');
        
        let score = 0;
        let selectedTiles = [];
        let audioCtx;
        let winInterval;
        let bgAudio, pianoAudio, introAudio;
        let gameActive = false;

        const allAnimals = [
            { icon: '🐶', type: 'dog', sound: 'dog.mp3' },
            { icon: '🐱', type: 'cat', sound: 'cat.mp3' },
            { icon: '🐮', type: 'cow', sound: 'cow.mp3' },
            { icon: '🐷', type: 'pig', sound: 'pig.mp3' },
            { icon: '🦁', type: 'lion', sound: 'lion.mp3' },
            { icon: '🐸', type: 'frog', sound: 'frog.mp3' },
            { icon: '🦆', type: 'duck', sound: 'duck.mp3' },
            { icon: '🐒', type: 'monkey', sound: 'monkey.mp3' },
            { icon: '🐘', type: 'elephant', sound: 'elephant.mp3' },
            { icon: '🐑', type: 'sheep', sound: 'sheep.mp3' }
        ];

        const praises = ['praise1.mp3', 'praise2.mp3', 'praise3.mp3', 'praise4.mp3', 'praise5.mp3'];

        function playSnd(file, loop = false, vol = 1) {
            try {
                const a = new Audio(file);
                a.loop = loop;
                a.volume = vol;
                a.play().catch(() => console.log("Missing: " + file));
                return a;
            } catch (e) { return null; }
        }

        // Generate synthetic sounds for Tap and Wrong
        function synthPop(freq, type = 'sine', decay = 0.2) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            g.gain.setValueAtTime(0.1, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + decay);
            osc.connect(g); g.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + decay);
        }

        function stopSnd(obj) {
            if (obj) { obj.pause(); obj.currentTime = 0; }
        }

        function unlock() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            if (!introAudio && !gameActive) {
                introAudio = playSnd('intro.mp3');
            }
        }
        window.addEventListener('click', unlock);
        window.addEventListener('touchstart', unlock);

        function createGrid() {
            container.innerHTML = '';
            let boardAnimals = [...allAnimals].sort(() => 0.5 - Math.random()).slice(0, 5);
            for (let i = 0; i < 16; i++) {
                const animalData = boardAnimals[Math.floor(Math.random() * boardAnimals.length)];
                const div = document.createElement('div');
                div.className = 'tile';
                div.innerHTML = animalData.icon;
                const tileInfo = { ...animalData };
                div.onclick = () => handleTap(div, tileInfo);
                container.appendChild(div);
            }
        }

        function handleTap(el, animalInfo) {
            if (el.classList.contains('selected') || el.classList.contains('wrong')) return;

            // Fail Early Logic
            if (selectedTiles.length > 0) {
                if (animalInfo.type !== selectedTiles[0].info.type) {
                    synthPop(120, 'sawtooth', 0.3); // BUZZER SOUND
                    el.classList.add('wrong');
                    setTimeout(() => {
                        selectedTiles.forEach(t => t.el.classList.remove('selected'));
                        selectedTiles = [];
                        el.classList.remove('wrong');
                    }, 500);
                    return;
                }
            }

            synthPop(440, 'sine', 0.2); // TAP SOUND
            el.classList.add('selected');
            selectedTiles.push({ el, info: animalInfo });

            if (selectedTiles.length === 3) {
                score += 2;
                scoreVal.innerText = score;
                const match = [...selectedTiles];
                selectedTiles = [];

                setTimeout(() => {
                    playSnd(match[0].info.sound);
                    setTimeout(() => playSnd(praises[Math.floor(Math.random()*praises.length)]), 1500);
                    fireConfetti(50, 50);
                    
                    match.forEach(m => {
                        m.el.classList.add('pop');
                        setTimeout(() => {
                            const next = allAnimals[Math.floor(Math.random() * allAnimals.length)];
                            const nextInfo = { ...next };
                            m.el.innerHTML = nextInfo.icon;
                            m.el.onclick = () => handleTap(m.el, nextInfo);
                            m.el.classList.remove('selected', 'pop');
                        }, 400);
                    });
                    if (score >= 10) setTimeout(showWin, 1200);
                }, 800);
            }
        }

        function initGame() {
            unlock();
            gameActive = true; 
            stopSnd(introAudio);
            document.getElementById('start-screen').style.display = 'none';
            wrapper.style.display = 'flex';
            bgAudio = playSnd('play_bg.mp3', true, 0.2);
            createGrid();
        }

        function showWin() {
            stopSnd(bgAudio);
            document.getElementById('win-screen').style.display = 'flex';
            pianoAudio = playSnd('piano.mp3', true, 0.5);
            playSnd('yay.mp3');
            winInterval = setInterval(() => {
                fireConfetti(Math.random() * 80 + 10, Math.random() * 80 + 10);
            }, 700);
        }

        function resetGame() {
            score = 0; scoreVal.innerText = score;
            if (winInterval) clearInterval(winInterval);
            stopSnd(pianoAudio);
            document.getElementById('win-screen').style.display = 'none';
            bgAudio = playSnd('play_bg.mp3', true, 0.2);
            createGrid();
        }

        function fireConfetti(x, y) {
            const colors = ['#ff4081', '#4facfe', '#f6d365', '#fda085', '#ffffff'];
            const f = document.createDocumentFragment();
            for (let i = 0; i < 40; i++) {
                const c = document.createElement('div');
                c.className = 'confetti-piece';
                c.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                c.style.left = x + '%'; c.style.top = y + '%';
                const a = Math.random() * Math.PI * 2;
                const d = Math.random() * 50 + 20;
                c.style.setProperty('--target-x', (Math.cos(a) * d) + 'vmin');
                c.style.setProperty('--target-y', (Math.sin(a) * d) + 'vmin');
                c.style.setProperty('--rotation', (Math.random() * 720) + 'deg');
                c.style.animationDuration = (Math.random() * 1 + 0.5) + 's';
                f.appendChild(c);
                setTimeout(() => c.remove(), 1500);
            }
            holder.appendChild(f);
        }
    </script>
</body>
</html>
